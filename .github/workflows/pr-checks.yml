name: Pull Request Checks

env:
  NODE_VERSION: 22

on:
  pull_request:
    branches:
      - main
      - dev

jobs:
  lint-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ env.NODE_VERSION }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ env.NODE_VERSION }}
        cache: 'npm'

    - name: Install Dependencies
      run: npm ci

    - name: Run ESLint
      run: npm run lint:js

    - name: Run Stylelint
      run: npm run lint:css

    - name: Check Formatting
      run: npm run format:check

    - name: Build CSS
      run: npm run build

    - name: Validate system.json
      run: |
        # Check if system.json is valid JSON
        if ! jq empty system.json 2>/dev/null; then
          echo "❌ system.json is not valid JSON"
          exit 1
        fi

        # Check required fields
        REQUIRED_FIELDS=("id" "title" "version" "compatibility" "authors")
        for field in "${REQUIRED_FIELDS[@]}"; do
          if ! jq -e ".$field" system.json > /dev/null 2>&1; then
            echo "❌ Missing required field: $field"
            exit 1
          fi
        done

        echo "✅ system.json validation passed"

    - name: Check version consistency
      run: |
        SYSTEM_VERSION=$(jq -r '.version' system.json)
        PACKAGE_VERSION=$(jq -r '.version' package.json)

        if [ "$SYSTEM_VERSION" != "$PACKAGE_VERSION" ]; then
          echo "⚠️  Warning: Version mismatch between system.json ($SYSTEM_VERSION) and package.json ($PACKAGE_VERSION)"
          echo "This may be intentional, but please verify."
        else
          echo "✅ Versions match: $SYSTEM_VERSION"
        fi

  summary:
    runs-on: ubuntu-latest
    needs: lint-and-build
    if: always()

    steps:
    - name: Check results
      run: |
        if [ "${{ needs.lint-and-build.result }}" != "success" ]; then
          echo "❌ PR checks failed"
          exit 1
        fi
        echo "✅ All PR checks passed"
